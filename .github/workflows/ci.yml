name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://habitflow:habitflow@localhost:5432/habitflow_ci
      SECRET_KEY: ci-only-secret-key-with-at-least-32-bytes
      ENVIRONMENT: development
      DEBUG: "false"
      APP_TIMEZONE: America/Bogota
      CORS_ORIGINS: '["http://localhost:5173"]'
      REFRESH_COOKIE_SECURE: "false"
      REFRESH_COOKIE_SAMESITE: lax
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: habitflow_ci
          POSTGRES_USER: habitflow
          POSTGRES_PASSWORD: habitflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habitflow -d habitflow_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements/base.txt
            backend/requirements/dev.txt
            backend/requirements/prod.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      - name: Run Alembic migrations against PostgreSQL
        run: python -m alembic upgrade head

      - name: Run backend tests
        run: python -m pytest

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  e2e:
    name: e2e
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start PostgreSQL and backend
        run: docker compose up -d --build postgres backend

      - name: Wait for backend health
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://localhost:8000/api/v1/health; then
              exit 0
            fi
            echo "Waiting for backend health (attempt ${attempt}/30)..."
            sleep 2
          done
          docker compose logs --no-color backend postgres
          exit 1

      - name: Run local Playwright smoke tests
        working-directory: frontend
        env:
          CI: "true"
          BASE_URL: http://localhost:5173
          VITE_API_URL: http://localhost:8000/api/v1
        run: npm run test:e2e:local

      - name: Capture Compose logs
        if: failure()
        run: docker compose logs --no-color backend postgres > compose-logs.txt || true

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-diagnostics
          path: |
            frontend/playwright-report
            frontend/test-results
            compose-logs.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop Compose services
        if: always()
        run: docker compose down -v || true
